font_family      JetBrainsMono Nerd Font
font_size        11.0

window_padding_width 12
hide_window_decorations yes
confirm_os_window_close 0

enable_audio_bell no

scrollback_pager nvim -c "set nonumber nolist showtabline=0 foldcolumn=0" -c "autocmd TermOpen * normal gg" -c "silent write! /tmp/kitty_scrollback | te cat /tmp/kitty_scrollback -"
scrollback_lines 10000


# BEGIN_KITTY_THEME
# Catppuccin-Macchiato
include current-theme.conf
# END_KITTY_THEME
