source = ~/.config/hypr/edp-state.conf
monitor = , preferred, auto, 1

exec-once = waybar
exec-once = mako
exec-once = hypridle
exec-once = hyprpolkitagent


env = XCURSOR_SIZE,20
env = QT_QPA_PLATFORM,wayland
env = MOZ_ENABLE_WAYLAND,1
env = LIBVA_DRIVER_NAME,iHD
env = GDK_SCALE,1

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = true
        tap-to-click = true
        disable_while_typing = true
    }
}


general {
    gaps_in = 3
    gaps_out = 5
    border_size = 2
    col.active_border = rgba(8aadf4ee)
    col.inactive_border = rgba(363a4faa)
    layout = dwindle
}

decoration {
    rounding = 4
}

animations {
    enabled = true
    bezier = quick, 0.15, 0, 0.1, 1
    animation = windows, 1, 2, quick
    animation = fade, 1, 2, quick
    animation = workspaces, 1, 2, quick, slide
    animation = border, 0
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

dwindle {
    preserve_split = true
}

$mod = SUPER

# Screenshot
bind = SHIFT, Print, exec, grim ~/Pictures/screenshot-$(date +%s).png


bind = $mod, Return, exec, kitty
bind = $mod, B, exec, firefox
bind = $mod, E, exec, kitty -e yazi
bind = $mod, D, exec, fuzzel --terminal "kitty -e"
bind = $mod, L, exec, hyprlock
bind = $mod, Q, killactive
bind = $mod SHIFT, E, exit
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating

bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

bind = $mod SHIFT, left,  movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up,    movewindow, u
bind = $mod SHIFT, down,  movewindow, d

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

bind = , Print, exec, grim -g "$(slurp)" - | wl-copy

bindel = , XF86MonBrightnessUp,   exec, brightnessctl set +5%
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindl  = , XF86AudioMicMute,      exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# Stop Allocating Window 1 to main screen when closed (using monitor)
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/lid-close.sh
bindl = , switch:off:Lid Switch, exec, echo 'monitor = eDP-1, 1366x768@60, 0x0, 1' > ~/.config/hypr/edp-state.conf && hyprctl reload
