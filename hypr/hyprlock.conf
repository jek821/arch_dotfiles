background {
    monitor =
    color = rgba(20, 22, 26, 1.0)
    blur_passes = 0
}
input-field {
    monitor =
    size = 250, 44
    outline_thickness = 2
    dots_center = true
    outer_color = rgba(88a0c8ee)
    inner_color = rgba(2a2a2aff)
    font_color = rgba(e0e0e0ff)
    placeholder_text = <i>password</i>
    position = 0, -40
    halign = center
    valign = center
}
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = rgba(e0e0e0ff)
    font_size = 56
    font_family = JetBrainsMono Nerd Font
    position = 0, 60
    halign = center
    valign = center
}
